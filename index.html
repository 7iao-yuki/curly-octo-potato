<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>自我介绍</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3/dist/tabler-icons.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  html,body{margin:0;padding:0}
  @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@600&family=Noto+Sans+SC:wght@400;500;700&display=swap');
  body{
    --page-bg:#ece3d4;--card-bg:#f5ede0;--title-color:#3a2a1a;--text:#3a2a0a;--muted:#b09070;
    --photo-bg:#e8d8c0;--photo-border:#a07848;--accent:#b07040;--accent-text:#fff;
    --section-bg:rgba(255,255,255,0.55);--section-border:#d9b88a;--line:#c09060;
    --tag-bg:#f0d8a8;--tag-text:#7a4a10;--save-bg:#3a3a55;
    min-height:100vh;background:var(--page-bg);transition:background .3s ease;-webkit-text-size-adjust:100%;font-family:'Noto Sans SC',sans-serif
  }
  body[data-palette="night"]{
    --page-bg:#12121f;--card-bg:#1a1a2e;--title-color:#c8965a;--text:#f0e8da;--muted:rgba(240,220,180,0.34);
    --photo-bg:#2d2d4e;--photo-border:#c8965a;--accent:#c8965a;--accent-text:#1a1a2e;
    --section-bg:rgba(255,255,255,0.06);--section-border:rgba(255,255,255,0.1);--line:rgba(200,150,90,0.55);
    --tag-bg:rgba(200,150,90,0.15);--tag-text:#e8c888;--save-bg:#c8965a;
  }
  body[data-palette="lavender"]{
    --page-bg:#eef0f6;--card-bg:linear-gradient(135deg,#7c6ef5,#a78bfa);--title-color:#fff;--text:#3d3458;--muted:#c4b5fd;
    --photo-bg:rgba(255,255,255,0.2);--photo-border:rgba(255,255,255,0.72);--accent:#7c6ef5;--accent-text:#fff;
    --section-bg:rgba(255,255,255,0.9);--section-border:rgba(255,255,255,0.42);--line:#d8cffd;
    --tag-bg:#f0eeff;--tag-text:#6d58e8;--save-bg:#7c6ef5;
  }
  body[data-palette="sage"]{
    --page-bg:#e7efe6;--card-bg:#f6faf3;--title-color:#263a2b;--text:#263a2b;--muted:#8aa08c;
    --photo-bg:#dbe8d4;--photo-border:#6f8f72;--accent:#5f8b68;--accent-text:#fff;
    --section-bg:rgba(255,255,255,.66);--section-border:#b7ccb0;--line:#85a883;--tag-bg:#dcebcf;--tag-text:#416346;--save-bg:#5f8b68;
  }
  body[data-palette="ocean"]{
    --page-bg:#e4f0f3;--card-bg:#f4fbfc;--title-color:#163c4a;--text:#183f4b;--muted:#7aa4af;
    --photo-bg:#d7ecf1;--photo-border:#4f91a4;--accent:#347f98;--accent-text:#fff;
    --section-bg:rgba(255,255,255,.68);--section-border:#a8d2dc;--line:#6faec0;--tag-bg:#d5eef3;--tag-text:#226477;--save-bg:#347f98;
  }
  body[data-palette="rose"]{
    --page-bg:#f6e8ec;--card-bg:#fff6f7;--title-color:#54303b;--text:#53313c;--muted:#b58b98;
    --photo-bg:#f1d9df;--photo-border:#b76d82;--accent:#b85f78;--accent-text:#fff;
    --section-bg:rgba(255,255,255,.68);--section-border:#e3b7c2;--line:#c98095;--tag-bg:#f3d6de;--tag-text:#8b3d53;--save-bg:#b85f78;
  }
  body[data-palette="sun"]{
    --page-bg:#f6efcf;--card-bg:#fffaf0;--title-color:#4c3a14;--text:#4c3a14;--muted:#af9657;
    --photo-bg:#f2df9c;--photo-border:#b88d28;--accent:#c28c1e;--accent-text:#fff;
    --section-bg:rgba(255,255,255,.7);--section-border:#dec478;--line:#bd9641;--tag-bg:#f3dda0;--tag-text:#7c5815;--save-bg:#c28c1e;
  }
  body[data-palette="mist"]{
    --page-bg:#e8ebee;--card-bg:#f8f9fa;--title-color:#2f3438;--text:#30363a;--muted:#8a939b;
    --photo-bg:#dde2e6;--photo-border:#79848c;--accent:#68737d;--accent-text:#fff;
    --section-bg:rgba(255,255,255,.72);--section-border:#c8d0d6;--line:#8d99a3;--tag-bg:#e1e6ea;--tag-text:#4a535b;--save-bg:#68737d;
  }
  body[data-palette="coral"]{
    --page-bg:#f5e7df;--card-bg:#fff7f2;--title-color:#4d2d20;--text:#4d2d20;--muted:#b18169;
    --photo-bg:#f1d5c4;--photo-border:#c57554;--accent:#c76745;--accent-text:#fff;
    --section-bg:rgba(255,255,255,.68);--section-border:#e2ad95;--line:#c98262;--tag-bg:#f4d4c2;--tag-text:#914730;--save-bg:#c76745;
  }
  body[data-palette="pine"]{
    --page-bg:#dfe8df;--card-bg:#f4f8f2;--title-color:#142d25;--text:#183229;--muted:#789486;
    --photo-bg:#d4e1d7;--photo-border:#426e5a;--accent:#295d4a;--accent-text:#fff;
    --section-bg:rgba(255,255,255,.66);--section-border:#a8c0b2;--line:#618a74;--tag-bg:#d4e6d8;--tag-text:#245142;--save-bg:#295d4a;
  }
  .tpl-switch{position:sticky;top:0;z-index:50;display:flex;justify-content:center;width:58px;margin:0 auto;padding:18px 0 6px}
  .palette-toggle{display:grid;place-items:center;width:48px;height:48px;padding:0;border:1px solid rgba(0,0,0,.08);border-radius:50%;background:rgba(255,255,255,.94);color:var(--accent);box-shadow:0 6px 22px rgba(0,0,0,.16);cursor:pointer;transition:transform .18s ease,box-shadow .18s ease}
  .palette-toggle:hover{transform:translateY(-1px)}
  .palette-toggle[aria-expanded="true"]{box-shadow:0 0 0 3px color-mix(in srgb,var(--accent) 24%,transparent),0 8px 24px rgba(0,0,0,.18)}
  .palette-toggle svg{width:30px;height:30px;pointer-events:none}
  .seg{position:absolute;top:72px;left:50%;display:grid;grid-template-columns:repeat(5,34px);gap:10px;padding:12px;transform:translateX(-50%) translateY(-6px);background:rgba(255,255,255,.96);border:1px solid rgba(0,0,0,.08);border-radius:22px;box-shadow:0 10px 30px rgba(0,0,0,.2);opacity:0;visibility:hidden;pointer-events:none;transition:opacity .18s ease,transform .18s ease,visibility .18s ease}
  .tpl-switch.open .seg{transform:translateX(-50%) translateY(0);opacity:1;visibility:visible;pointer-events:auto}
  .seg button{flex:0 0 auto;width:34px;height:34px;padding:0;border:2px solid rgba(255,255,255,.75);border-radius:50%;cursor:pointer;transition:transform .15s,box-shadow .15s;border-color:rgba(255,255,255,.9);font-size:0}
  .seg button:hover{transform:translateY(-1px)}
  .seg button.active{box-shadow:0 0 0 3px rgba(0,0,0,.2),0 4px 14px rgba(0,0,0,.18)}
  .seg button[data-palette="warm"]{background:linear-gradient(135deg,#f5ede0,#b07040)}
  .seg button[data-palette="night"]{background:linear-gradient(135deg,#1a1a2e,#c8965a)}
  .seg button[data-palette="lavender"]{background:linear-gradient(135deg,#7c6ef5,#f0eeff)}
  .seg button[data-palette="sage"]{background:linear-gradient(135deg,#f6faf3,#5f8b68)}
  .seg button[data-palette="ocean"]{background:linear-gradient(135deg,#f4fbfc,#347f98)}
  .seg button[data-palette="rose"]{background:linear-gradient(135deg,#fff6f7,#b85f78)}
  .seg button[data-palette="sun"]{background:linear-gradient(135deg,#fffaf0,#c28c1e)}
  .seg button[data-palette="mist"]{background:linear-gradient(135deg,#f8f9fa,#68737d)}
  .seg button[data-palette="coral"]{background:linear-gradient(135deg,#fff7f2,#c76745)}
  .seg button[data-palette="pine"]{background:linear-gradient(135deg,#f4f8f2,#295d4a)}
  .stage{display:flex;justify-content:center;padding:14px 18px 8px}
  .stage-inner{width:100%;max-width:940px;min-width:0}
  .tpl{display:none;width:100%}
  .tpl.tpl--active{display:block;animation:tplFade .18s ease both}
  @keyframes tplFade{from{opacity:.65;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
  @media(min-width:561px){
    .tpl.tpl--active{display:flex;flex-direction:column;min-height:500px}
    .tpl.tpl--active > div{flex:1;min-height:0}
    .tpl--active .si-root{display:flex;flex-direction:column}
    .tpl--active .si-main{flex:1;min-height:0}
  }
  /* unify the photo upload box across all three templates */
  .tpl--active .si-photo-frame,
  .tpl--active .v2-avatar,
  .tpl--active .v3-avatar{
    flex:0 0 auto !important;width:min(320px,100%) !important;height:auto !important;
    aspect-ratio:var(--photo-ratio,4/5) !important;min-height:0 !important;max-height:none !important;
    align-self:center !important;margin-block:auto !important;
  }
  .tpl--active #photo-upload,
  .tpl--active .v2-avatar input,
  .tpl--active .v3-avatar input{display:none !important;}
  /* save-as-image action bar */
  .action-bar{display:flex;justify-content:center;padding:6px 18px 40px}
  .save-btn{border:none;border-radius:999px;background:var(--save-bg);color:#fff;font-family:'Noto Sans SC',sans-serif;font-size:16px;font-weight:600;padding:13px 34px;cursor:pointer;box-shadow:0 6px 18px rgba(0,0,0,0.2);transition:transform .1s,opacity .2s,background .2s;display:inline-flex;align-items:center;gap:8px}
  .save-btn:hover{opacity:.93}
  .save-btn:active{transform:translateY(1px)}
  .save-btn[disabled]{opacity:.6;cursor:default}
  /* hide interactive affordances while exporting */
  .exporting .si-add,.exporting .v2-add,.exporting .v3-add,
  .exporting #tag-input,.exporting .v2-tag-input,.exporting .v3-chip-input,
  .exporting .tag-x{display:none !important}
  /* export result overlay */
  .export-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:200;padding:18px}
  .export-card{background:#fff;border-radius:14px;padding:16px;max-width:min(420px,92vw);max-height:90vh;overflow:auto;text-align:center;box-shadow:0 14px 50px rgba(0,0,0,.4)}
  .export-card img{width:100%;height:auto;border-radius:8px;display:block}
  .export-card p{font-family:'Noto Sans SC',sans-serif;font-size:13px;color:#555;margin:12px 4px 14px;line-height:1.6}
  .export-actions{display:flex;gap:10px;justify-content:center}
  .export-actions a,.export-actions button{font-family:'Noto Sans SC',sans-serif;font-size:14px;border-radius:999px;padding:9px 20px;cursor:pointer;text-decoration:none}
  .export-dl{background:#3a3a55;color:#fff;border:none}
  .export-close{background:#eee;color:#333;border:none}
  .capture-wide .tpl--active{width:940px !important;max-width:940px !important}
  .capture-wide .tpl--active > div{width:940px !important;max-width:940px !important;box-sizing:border-box}
  .capture-wide .tpl--active .si-main,
  .capture-wide .tpl--active .v2,
  .capture-wide .tpl--active .v3{
    grid-template-columns:minmax(260px,0.9fr) minmax(0,1.25fr) !important;
  }
  .capture-wide .tpl--active .si-right,
  .capture-wide .tpl--active .v2-grid,
  .capture-wide .tpl--active .v3-body{
    grid-template-columns:1fr 1fr !important;
  }
  .capture-wide .tpl--active .si-title,
  .capture-wide .tpl--active .v2-title-script,
  .capture-wide .tpl--active .v3-title{text-align:left !important}
  @media(max-width:560px){
    .stage{padding:10px 12px 6px}
    .seg button{width:34px;height:34px;padding:0;font-size:0}
    .tpl--active .si-photo-frame,
    .tpl--active .v2-avatar,
    .tpl--active .v3-avatar{margin-block:14px}
  }
  @media(max-width:960px){
    .tpl--active,.tpl--active > div{max-width:100%;min-width:0;box-sizing:border-box}
    .tpl--active .v2,
    .tpl--active .v3{grid-template-columns:1fr !important;overflow:hidden}
    .tpl--active .v2-grid,
    .tpl--active .v3-body,
    .tpl--active .si-right{grid-template-columns:1fr !important;min-width:0}
    .tpl--active .v2-photo,
    .tpl--active .v2-card,
    .tpl--active .v3-photo,
    .tpl--active .v3-cell{min-width:0}
    .tpl--active .v2-title-script,
    .tpl--active .v3-title{overflow-wrap:anywhere;text-align:center}
  }
</style>
</head>
<body>
<div class="tpl-switch">
  <button class="palette-toggle" type="button" aria-label="选择页面颜色" aria-expanded="false" title="选择颜色">

</div>
<div class="stage">
  <div class="stage-inner">
    <div class="tpl tpl--active" data-tpl="warm">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@600&family=Noto+Sans+SC:wght@400;500;700&display=swap');
  .si-root { font-family: 'Noto Sans SC', sans-serif; background: var(--card-bg); border-radius: 16px; padding: 28px 32px; position: relative; transition:background .25s,color .25s; }
  .si-title { font-family: 'Caveat', cursive; font-size: 42px; color: var(--title-color); text-align: left; margin: 0 0 18px; padding-left:10px; box-sizing:border-box; letter-spacing: 1px; text-shadow:0 3px 0 rgba(0,0,0,.12); }
  .si-main { display: grid; grid-template-columns: minmax(260px,0.9fr) minmax(0,1.25fr); gap: 24px; align-items: stretch; }
  .si-badge { display: flex; flex-direction: column; align-items: stretch; min-width:0; }
  .si-photo-frame { width: 100%; flex: 1; min-height: 220px; background: var(--photo-bg); border-radius: 8px; border: 3px solid var(--photo-border); display: flex; align-items: center; justify-content: center; overflow: hidden; cursor: pointer; position: relative; transition: opacity 0.2s,background .25s,border-color .25s; }
  .si-photo-frame:hover { opacity: 0.85; }
  .si-photo-frame img { width: 100%; height: 100%; object-fit: cover; display: block; }
  #photo-upload { display: none; }
  .si-photo-placeholder { font-size: 14px; color: var(--text); text-align: center; padding: 8px; line-height: 1.5; }
  .si-photo-placeholder i { font-size: 38px; display: block; margin-bottom: 8px; }
  .si-badge-label { display:none; }
  .si-field { font-size: 14px; color: var(--text); width: 100%; text-align: center; border-bottom: 1px dashed var(--line); padding: 4px 0; }
  .si-right { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; min-width:0; }
  .si-section { background: var(--section-bg); border-radius: 12px; padding: 14px 16px; border: 1px solid var(--section-border); min-width:0; transition:background .25s,border-color .25s; }
  .si-section-title { font-family:'Noto Sans SC',sans-serif; font-size: 16px; font-weight: 700; color: var(--accent-text); background: var(--accent); border-radius: 8px; padding: 4px 14px; display: inline-block; margin-bottom: 10px; letter-spacing:.5px; }
  .si-item { font-size: 15px; color: var(--text); font-weight: 500; margin: 6px 0; display: flex; align-items: center; gap: 6px; }
  .si-item i { font-size: 16px; color: var(--accent); }
  .si-tag { display: inline-flex; align-items:center; gap:4px; font-size: 13px; color: var(--tag-text); background: var(--tag-bg); border-radius: 20px; padding: 3px 10px 3px 12px; margin: 3px 3px 3px 0; cursor:pointer; }
  .tag-x{font-size:12px;line-height:1;opacity:.62}
  .si-input { background: transparent; border: none; border-bottom: 1px dashed var(--line); outline: none; font-size: 15px; color: var(--text); font-family: 'Noto Sans SC', sans-serif; font-weight: 500; width: 100%; min-width:0; box-sizing:border-box; padding: 2px 0; letter-spacing:.3px; }
  .si-input[data-field="mbti"]{text-transform:uppercase}
  textarea.si-input { resize:none; overflow:hidden; line-height:1.55; min-height:1.8em; display:block; }
  .si-input::placeholder { color: var(--muted); font-family:'Noto Sans SC',sans-serif; }
  .si-add { display:inline-flex; align-items:center; gap:5px; font-size:14px; color:var(--accent); background:transparent; border:1px dashed var(--line); border-radius:14px; padding:3px 11px; margin:6px 0; cursor:pointer; font-family:'Noto Sans SC',sans-serif; }
  .si-add:hover { background:rgba(176,112,64,0.1); color:var(--accent); }
  .si-add b { font-size:15px; font-weight:400; line-height:1; }
  @media(max-width:960px){
    .si-title{text-align:center;padding-left:0}
    .si-main{grid-template-columns:1fr}

</div>
<script>
function extractTagsFromSentence(text) {
  const stop = new Set(['我','我们','本人','一个','一种','喜欢','热爱','爱好','擅长','比较','非常','特别','以及','还有','和','与','的','了','是','会','也','都','很','想','希望','平时','日常']);
  const cleaned = text.replace(/[，。！？、；;,.!?/|+&\n\r]+/g, ' ');
  const phraseMap = [

  ];

    if (word.length > 8) return;
    if (!tags.includes(word)) tags.push(word);
  });
  return tags.slice(0, 5).map(t => t.startsWith('#') ? t : '#' + t);

    <div class="v3-cell">
      <div class="v3-cell-title">我的标签</div>
      <div id="v3-tags"></div>
      <input class="v3-chip-input" id="v3-tinput" placeholder="输入标签，回车添加">
    </div>
  </div>
</div>
<script>
(function(){
  const fr=document.getElementById('v3-frame'),up=document.getElementById('v3-upload'),ht=document.getElementById('v3-hint');
  fr.addEventListener('click',()=>up.click());
  up.addEventListener('change',e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{ht.style.display='none';let img=fr.querySelector('img');if(!img){img=document.createElement('img');fr.appendChild(img);}img.onload=()=>{fr.style.setProperty('--photo-ratio',`${img.naturalWidth}/${img.naturalHeight}`);};img.src=ev.target.result;};r.readAsDataURL(f);});
  const tc=document.getElementById('v3-tags'),ti=document.getElementById('v3-tinput');
  ['#周末摄影师','#终身学习践行者','#爱猫爱伯恩山'].forEach(addC);
  function addC(txt){const s=document.createElement('span');s.className='v3-chip';s.innerHTML=txt+'<span class="tag-x">×</span>';s.onclick=()=>s.remove();tc.appendChild(s);}
  ti.addEventListener('keydown',e=>{if(e.key==='Enter'&&ti.value.trim()){e.preventDefault();let v=ti.value.trim();if(!v.startsWith('#'))v='#'+v;addC(v);ti.value='';}});
  document.querySelectorAll('.v3 .v3-line.optional').forEach(function(row){
    const inp=row.querySelector('input,textarea');
    const chip=document.createElement('span');
    chip.className='v3-add';
    chip.innerHTML='<b>＋</b>'+row.dataset.label;
    row.parentNode.insertBefore(chip,row);
    chip.addEventListener('click',()=>{chip.style.display='none';row.style.display='flex';inp.focus();});
    inp.addEventListener('blur',()=>{if(!inp.value.trim()){row.style.display='none';chip.style.display='inline-flex';}});
    if(!inp.value.trim()){row.style.display='none';}else{chip.style.display='none';}
  });
  (function(){
    const hobbies=Array.from(document.querySelectorAll('.v3 .v3-hobby'));
    if(hobbies.length<2)return;
    const addBtn=document.createElement('span');
    addBtn.className='v3-add';addBtn.innerHTML='<b>＋</b>添加爱好';
    hobbies[hobbies.length-1].after(addBtn);
    hobbies.forEach((h,i)=>{if(i>0)h.style.display='none';});
    const nextHidden=()=>hobbies.find(h=>h.style.display==='none');
    const lastVisible=()=>{let l=null;hobbies.forEach(h=>{if(h.style.display!=='none')l=h;});return l;};
    const refresh=()=>{addBtn.style.display=nextHidden()?'inline-flex':'none';};
    addBtn.addEventListener('click',()=>{const h=nextHidden();if(h){h.style.display='flex';h.querySelector('input,textarea').focus();refresh();}});
    hobbies.forEach(h=>{const inp=h.querySelector('input,textarea');inp.addEventListener('blur',()=>{if(!inp.value.trim()&&h===lastVisible()&&h!==hobbies[0]){h.style.display='none';refresh();}});});
    refresh();
  })();
})();
</script>

    </div>
  </div>
</div>
<div class="action-bar">
  <button class="save-btn" id="save-btn"><i class="ti ti-download" aria-hidden="true"></i>保存为图片</button>
</div>
<script>
(function(){
  function resizeField(el){
    el.style.height='auto';
    el.style.height=el.scrollHeight+'px';
  }
  function wireAutoGrow(root){
    root.querySelectorAll('textarea').forEach(function(el){
      resizeField(el);
      el.addEventListener('input',function(){resizeField(el);});
    });
  }
  wireAutoGrow(document);
  document.querySelectorAll('.seg button').forEach(function(btn){
    btn.addEventListener('click',function(){setTimeout(function(){wireAutoGrow(document);},30);});
  });
})();

(function(){
  var btns=document.querySelectorAll('.seg button');
  var switcher=document.querySelector('.tpl-switch');
  var toggle=document.querySelector('.palette-toggle');
  var menu=document.querySelector('.seg');
  var mainTpl=document.querySelector('.tpl[data-tpl="warm"]');
  document.querySelectorAll('.tpl').forEach(function(t){
    t.classList.toggle('tpl--active',t===mainTpl);
  });
  function setPalette(name){
    document.body.setAttribute('data-palette',name);
    btns.forEach(function(b){b.classList.toggle('active',b.getAttribute('data-palette')===name);});
  }
  function setMenu(open){
    switcher.classList.toggle('open',open);
    toggle.setAttribute('aria-expanded',open?'true':'false');
    menu.setAttribute('aria-hidden',open?'false':'true');
  }
  toggle.addEventListener('click',function(e){
    e.stopPropagation();
    setMenu(!switcher.classList.contains('open'));
  });
  btns.forEach(function(b){b.addEventListener('click',function(){
    setPalette(b.getAttribute('data-palette'));
    setMenu(false);
  });});
  menu.addEventListener('click',function(e){e.stopPropagation();});
  document.addEventListener('click',function(){setMenu(false);});
  setPalette('warm');
})();

(function(){
  var btn=document.getElementById('save-btn');
  function showResult(dataUrl){
    var ov=document.createElement('div');ov.className='export-overlay';
    var card=document.createElement('div');card.className='export-card';
    var img=document.createElement('img');img.src=dataUrl;img.alt='自我介绍';
    var p=document.createElement('p');p.textContent='手机：长按上面的图片即可保存到相册。电脑：点下方“下载图片”。';
    var act=document.createElement('div');act.className='export-actions';
    var dl=document.createElement('a');dl.className='export-dl';dl.href=dataUrl;dl.download='自我介绍.png';dl.textContent='下载图片';
    var cl=document.createElement('button');cl.className='export-close';cl.textContent='关闭';
    act.appendChild(dl);act.appendChild(cl);
    card.appendChild(img);card.appendChild(p);card.appendChild(act);
    ov.appendChild(card);document.body.appendChild(ov);
    cl.onclick=function(){ov.remove();};
    ov.addEventListener('click',function(e){if(e.target===ov)ov.remove();});
  }
  function save(){
    var wrap=document.querySelector('.tpl--active');
    var cardEl=wrap?wrap.querySelector(':scope > div'):null;
    if(!cardEl){return;}
    var frame=cardEl.querySelector('.si-photo-frame,.v2-avatar,.v3-avatar');
    var prevH=frame?frame.style.height:'';
    document.body.classList.add('capture-wide');
    wrap.classList.add('exporting');
    document.querySelectorAll('textarea').forEach(function(el){
      el.style.height='auto';
      el.style.height=el.scrollHeight+'px';
    });
    if(frame){frame.style.height=frame.offsetHeight+'px';}   // html2canvas ignores aspect-ratio; pin height
    var old=btn.innerHTML;btn.disabled=true;btn.textContent='生成中…';
    function finish(){document.body.classList.remove('capture-wide');wrap.classList.remove('exporting');if(frame){frame.style.height=prevH;}btn.disabled=false;btn.innerHTML=old;}
    var ready=(window.document.fonts&&document.fonts.ready)?document.fonts.ready:Promise.resolve();
    ready.then(function(){
      return new Promise(function(resolve){requestAnimationFrame(function(){resolve();});});
    }).then(function(){
      return html2canvas(cardEl,{scale:2,useCORS:true,backgroundColor:null,logging:false,width:cardEl.scrollWidth,height:cardEl.scrollHeight,windowWidth:1100});
    }).then(function(canvas){
      showResult(canvas.toDataURL('image/png'));finish();
    }).catch(function(){finish();alert('生成图片失败，可改用手机自带截图。');});
  }
  btn.addEventListener('click',save);
})();
</script>
</body>
